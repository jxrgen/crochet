<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crothet - STL Tekstur Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    header { background: #1a1a2e; padding: 1rem 2rem; border-bottom: 2px solid #e94560; }
    header h1 { color: #e94560; font-size: 1.5rem; }
    header p { color: #888; font-size: 0.9rem; margin-top: 0.25rem; }
    .container { display: flex; height: calc(100vh - 80px); }
    .sidebar { width: 320px; background: #16213e; padding: 1.5rem; overflow-y: auto; border-right: 1px solid #333; }
    .viewer { flex: 1; position: relative; }
    .upload-area { border: 2px dashed #e94560; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { background: #1a1a2e; border-color: #ff6b81; }
    .upload-area input { display: none; }
    .upload-area p { color: #aaa; margin-top: 0.5rem; }
    .section { margin-top: 1.5rem; }
    .section h3 { color: #e94560; margin-bottom: 0.75rem; font-size: 1rem; }
    .control { margin-bottom: 1rem; }
    .control label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.3rem; }
    .control select, .control input[type="range"] { width: 100%; padding: 0.5rem; background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; }
    .control input[type="range"] { padding: 0; }
    .control .value { float: right; color: #e94560; }
    button { width: 100%; padding: 0.75rem; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; transition: background 0.3s; }
    button:hover { background: #ff6b81; }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; font-size: 0.85rem; display: none; }
    #status.success { display: block; background: #1a3a2e; color: #4ade80; border: 1px solid #4ade80; }
    #status.error { display: block; background: #3a1a1a; color: #f87171; border: 1px solid #f87171; }
    #info { margin-top: 1rem; font-size: 0.8rem; color: #666; }
    canvas { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Crothet</h1>
    <p>Upload en STL-fil og giv den et strikket eller hæklet udseende</p>
  </header>
  <div class="container">
    <div class="sidebar">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".stl">
        <strong>Upload STL-fil</strong>
        <p>Klik her eller træk fil hertil</p>
      </div>

      <div class="section">
        <h3>Tekstur Type</h3>
        <div class="control">
          <label for="patternType">Vælg mønster</label>
          <select id="patternType">
            <option value="knit">Strikket (Stockinette)</option>
            <option value="crochet">Hæklet (Loop)</option>
            <option value="bobble">Bobbel</option>
            <option value="rib">Rib</option>
            <option value="cable">Kabel</option>
            <option value="seed">Seed Stitch</option>
            <option value="garter">Garter Stitch</option>
            <option value="shell">Shell Stitch (Hæklet)</option>
          </select>
        </div>
      </div>

      <div class="section">
        <h3>Tekstur Indstillinger</h3>
        <div class="control">
          <label for="scale">Mønster størrelse <span class="value" id="scaleValue">2.0</span></label>
          <input type="range" id="scale" min="0.5" max="5" step="0.1" value="2">
        </div>
        <div class="control">
          <label for="depth">Dybde <span class="value" id="depthValue">0.5</span></label>
          <input type="range" id="depth" min="0.1" max="2" step="0.1" value="0.5">
        </div>
        <div class="control">
          <label for="resolution">Opløsning <span class="value" id="resolutionValue">50</span></label>
          <input type="range" id="resolution" min="10" max="100" step="5" value="50" disabled>
          <small style="color:#666">Bruges ikke længere</small>
        </div>
      </div>

      <button id="applyBtn" disabled>Anvend Tekstur</button>
      <button id="downloadBtn" disabled>Download STL</button>
      <div id="status"></div>
      <div id="info"></div>
    </div>
    <div class="viewer" id="viewer"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="app.js"></script>
</body>
</html>
